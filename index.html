<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мопсокликер</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0d0d1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Левая панель — Кликер */
        .clicker-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #1a1a3a 0%, #050510 100%);
            position: relative;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            color: #ffb84d;
            text-shadow: 0 0 10px rgba(255, 184, 77, 0.5);
        }

        .score-display {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 208, 0.5);
        }

        .mpc-ps {
            font-size: 1.1rem;
            color: #aaa;
            margin-top: -15px;
            margin-bottom: 25px;
        }

        .pug-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.05s ease;
        }

        .pug-container:active {
            transform: scale(0.95);
        }

        .pug-image {
            width: 350px;
            height: 350px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #ffb84d;
            box-shadow: 0 0 30px rgba(255, 184, 77, 0.3);
            pointer-events: none;
        }

        /* Правая панель — Магазин */
        .shop-section {
            width: 450px;
            background: #121225;
            border-left: 3px solid #ffb84d;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .tabs {
            display: flex;
            background: #1c1c3a;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .tab-btn.active {
            color: #fff;
            background: #121225;
            border-bottom: 3px solid #00ffcc;
        }

        .shop-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .shop-panel {
            display: none;
        }

        .shop-panel.active {
            display: block;
        }

        .upgrade-item {
            background: #1c1c3a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        .upgrade-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .upgrade-info {
            max-width: 65%;
        }

        .upgrade-name {
            font-weight: bold;
            font-size: 1.1rem;
            color: #ffb84d;
            margin-bottom: 5px;
        }

        .upgrade-desc {
            font-size: 0.85rem;
            color: #ccc;
        }

        .buy-btn {
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .buy-btn:hover:not(:disabled) {
            background: #00ccaa;
            transform: translateY(-2px);
        }

        .buy-btn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }

        /* Вылетающие цифры клика */
        .click-text {
            position: absolute;
            color: #00ffcc;
            font-weight: bold;
            font-size: 1.5rem;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(0.8); opacity: 0; }
        }

        /* Финал игры */
        #victory-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000;
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        #victory-screen h2 {
            font-size: 3rem;
            color: #ff3333;
            margin-bottom: 20px;
        }
        #victory-screen p {
            font-size: 1.5rem;
            max-width: 600px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <!-- Экран победы -->
    <div id="victory-screen">
        <h2>КОНЕЦ ВСЕГО</h2>
        <p>Мопс достиг Бесконечности. Он поглотил время, пространство, реальность и сам код этой игры. Больше ничего не осталось... только сытый жирный мопс в пустоте.</p>
    </div>

    <!-- Кликер -->
    <div class="clicker-section">
        <h1>Мопсокликер</h1>
        <div class="score-display" id="score">0 МПС</div>
        <div class="mpc-ps" id="mps-display">В секунду: 0</div>
        
        <div class="pug-container" id="pug-click">
            <!-- Используем сгенерированное изображение (заглушка на локальный файл + онлайн копия для демонстрации) -->
            <img src="Gemini_Generated_Image_a1v00ea1v00ea1v0.png" onerror="this.src='https://picsum.photos/id/1025/350/350'" class="pug-image" alt="Жирный Мопс">
        </div>
    </div>

    <!-- Магазин -->
    <div class="shop-section">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('clicks')">Еда (Клик)</button>
            <button class="tab-btn" onclick="switchTab('autos')">Автокликеры</button>
        </div>

        <div class="shop-content">
            <!-- Вкладка Кликов (Еда) -->
            <div id="clicks-panel" class="shop-panel active"></div>
            
            <!-- Вкладка Автокликеров -->
            <div id="autos-panel" class="shop-panel"></div>
        </div>
    </div>

    <script>
        // Состояние игры
        let mopsCoins = 0;
        let mpcPerClick = 1;
        let mopsPerSecond = 0;

        // Элементы DOM
        const scoreEl = document.getElementById('score');
        const mpsEl = document.getElementById('mps-display');
        const pugClick = document.getElementById('pug-click');
        const clicksPanel = document.getElementById('clicks-panel');
        const autosPanel = document.getElementById('autos-panel');

        // Данные улучшений клика (Еда)
        const foodUpgrades = [
            { id: 'f1', name: 'Кусочек хлеба', cost: 10, add: 1, count: 0 },
            { id: 'f2', name: 'Сосиска', cost: 100, add: 5, count: 0 },
            { id: 'f3', name: 'Большая сосиска', cost: 500, add: 25, count: 0 },
            { id: 'f4', name: 'Палка колбасы', cost: 2000, add: 120, count: 0 },
            { id: 'f5', name: 'Суп', cost: 10000, add: 600, count: 0 },
            { id: 'f6', name: 'Стол с едой', cost: 50000, add: 3500, count: 0 },
            { id: 'f7', name: 'Кастрюля пельменей', cost: 250000, add: 20000, count: 0 },
            { id: 'f8', name: 'Компьютер', cost: 1200000, add: 100000, count: 0 },
            { id: 'f9', name: 'Квартира', cost: 7000000, add: 550000, count: 0 },
            { id: 'f10', name: 'Дом', cost: 50000000, add: 4000000, count: 0 },
            { id: 'f11', name: 'Улица', cost: 300000000, add: 30000000, count: 0 },
            { id: 'f12', name: 'Город', cost: 2000000000, add: 250000000, count: 0 },
            { id: 'f13', name: 'Страна', cost: 15000000000, add: 2000000000, count: 0 },
            { id: 'f14', name: 'Континент', cost: 100000000000, add: 18000000000, count: 0 },
            // Планеты
            { id: 'p1', name: 'Меркурий', cost: 800000000000, add: 150000000000, count: 0 },
            { id: 'p2', name: 'Венера', cost: 5000000000000, add: 1000000000000, count: 0 },
            { id: 'p3', name: 'Земля', cost: 35000000000000, add: 8000000000000, count: 0 },
            { id: 'p4', name: 'Марс', cost: 200000000000000, add: 60000000000000, count: 0 },
            { id: 'p5', name: 'Юпитер', cost: 1500000000000000, add: 500000000000000, count: 0 },
            { id: 'p6', name: 'Сатурн (родной трон)', cost: 10000000000000000, add: 4000000000000000, count: 0 },
            { id: 'p7', name: 'Уран', cost: 80000000000000000, add: 35000000000000000, count: 0 },
            { id: 'p8', name: 'Нептун', cost: 600000000000000000, add: 300000000000000000, count: 0 },
            // Космос дальше
            { id: 'c1', name: 'Галактика Млечный Путь', cost: 5000000000000000000, add: 2500000000000000000, count: 0 },
            { id: 'c2', name: 'Вселенная', cost: 50000000000000000000, add: 20000000000000000000, count: 0 },
            { id: 'c3', name: 'Гигавселенная', cost: 999999999999999999999, add: 500000000000000000000, count: 0 },
            { id: 'c4', name: 'Весь Космос', cost: 50000000000000000000000, add: 2500000000000000000000, count: 0 },
            { id: 'infinity', name: 'БЕСКОНЕЧНОСТЬ (Сьесть всё)', cost: Infinity, add: 0, count: 0, desc: 'Закончить игру. Стоимость: Достичь невозможно.' }
        ];

        // Данные автокликеров
        const autoUpgrades = [
            { id: 'a1', name: '«как то само кликает не знаю»', cost: 50, mps: 1, count: 0 },
            { id: 'a2', name: '«полуавтокликер»', cost: 250, mps: 8, count: 0 },
            { id: 'a3', name: '«почти автокликер»', cost: 1500, mps: 50, count: 0 },
            { id: 'a4', name: '«автокликер»', cost: 8000, mps: 300, count: 0 },
            { id: 'a5', name: '«очень автокликер»', cost: 50000, mps: 2000, count: 0 },
            { id: 'a6', name: '«мега жесктйи автокликер»', cost: 300000, mps: 15000, count: 0 },
            { id: 'a7', name: 'Ультра-мопс кликер', cost: 2000000, mps: 100000, count: 0 },
            { id: 'a8', name: 'Аннигиляторный автокликер', cost: 15000000, mps: 800000, count: 0 }
        ];

        // Форматирование чисел для красоты
        function formatValue(val) {
            if (val === Infinity) return '∞';
            if (val >= 1e21) return (val / 1e21).toFixed(2) + ' Sext';
            if (val >= 1e18) return (val / 1e18).toFixed(2) + ' Quint';
            if (val >= 1e15) return (val / 1e15).toFixed(2) + ' Квадр';
            if (val >= 1e12) return (val / 1e12).toFixed(2) + ' Трилл';
            if (val >= 1e9) return (val / 1e9).toFixed(2) + ' Млрд';
            if (val >= 1e6) return (val / 1e6).toFixed(2) + ' Млн';
            return Math.floor(val).toLocaleString();
        }

        // Обновление интерфейса
        function updateUI() {
            scoreEl.textContent = formatValue(mopsCoins) + ' МПС';
            mpsEl.textContent = `В секунду: ${formatValue(mopsPerSecond)} (Клик: +${formatValue(mpcPerClick)})`;
            
            // Проверка доступности кнопок еды
            foodUpgrades.forEach(upg => {
                const btn = document.getElementById(`btn-${upg.id}`);
                if (btn) {
                    btn.disabled = mopsCoins < upg.cost;
                    if (upg.id === 'infinity') btn.disabled = true; // Бесконечность нельзя купить обычным способом
                }
            });

            // Проверка доступности автокликеров
            autoUpgrades.forEach(upg => {
                const btn = document.getElementById(`btn-${upg.id}`);
                if (btn) {
                    btn.disabled = mopsCoins < upg.cost;
                }
            });
        }

        // Клик по мопсу
        pugClick.addEventListener('click', (e) => {
            mopsCoins += mpcPerClick;
            createClickEffect(e.clientX, e.clientY, mpcPerClick);
            updateUI();
        });

        // Создание циферок при клике
        function createClickEffect(x, y, amount) {
            const text = document.createElement('div');
            text.className = 'click-text';
            text.textContent = `+${formatValue(amount)}`;
            text.style.left = `${x - 20}px`;
            text.style.top = `${y - 20}px`;
            document.body.appendChild(text);
            setTimeout(() => text.remove(), 800);
        }

        // Переключение вкладок
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.shop-panel').forEach(p => p.classList.remove('active'));
            
            if (tab === 'clicks') {
                document.querySelector('[onclick="switchTab(\'clicks\')"]').classList.add('active');
                clicksPanel.classList.add('active');
            } else {
                document.querySelector('[onclick="switchTab(\'autos\')"]').classList.add('active');
                autosPanel.classList.add('active');
            }
        }

        // Инициализация магазина еды
        function initFoodShop() {
            clicksPanel.innerHTML = '';
            foodUpgrades.forEach(upg => {
                const item = document.createElement('div');
                item.className = 'upgrade-item';
                
                const descText = upg.id === 'infinity' ? upg.desc : `Увеличивает силу клика на +${formatValue(upg.add)}. Куплено: <span id="count-${upg.id}">0</span>`;
                
                item.innerHTML = `
                    <div class="upgrade-info">
                        <div class="upgrade-name">${upg.name}</div>
                        <div class="upgrade-desc">${descText}</div>
                    </div>
                    <button class="buy-btn" id="btn-${upg.id}" onclick="buyFood('${upg.id}')">
                        ${upg.id === 'infinity' ? '???' : formatValue(upg.cost) + ' МПС'}
                    </button>
                `;
                clicksPanel.appendChild(item);
            });
        }

        // Инициализация магазина автокликеров
        function initAutoShop() {
            autosPanel.innerHTML = '';
            autoUpgrades.forEach(upg => {
                const item = document.createElement('div');
                item.className = 'upgrade-item';
                item.innerHTML = `
                    <div class="upgrade-info">
                        <div class="upgrade-name">${upg.name}</div>
                        <div class="upgrade-desc">Дает +${formatValue(upg.mps)} МПС/сек. Куплено: <span id="count-${upg.id}">0</span></div>
                    </div>
                    <button class="buy-btn" id="btn-${upg.id}" onclick="buyAuto('${upg.id}')">${formatValue(upg.cost)} МПС</button>
                `;
                autosPanel.appendChild(item);
            });
        }

        // Покупка еды
        window.buyFood = function(id) {
            const upg = foodUpgrades.find(u => u.id === id);
            if (mopsCoins >= upg.cost && id !== 'infinity') {
                mopsCoins -= upg.cost;
                upg.count++;
                mpcPerClick += upg.add;
                upg.cost = Math.floor(upg.cost * 1.3); // Увеличение цены
                
                document.getElementById(`count-${id}`).textContent = upg.count;
                document.getElementById(`btn-${id}`).textContent = formatValue(upg.cost) + ' МПС';
                updateUI();
            }
        };

        // Покупка автокликера
        window.buyAuto = function(id) {
            const upg = autoUpgrades.find(u => u.id === id);
            if (mopsCoins >= upg.cost) {
                mopsCoins -= upg.cost;
                upg.count++;
                mopsPerSecond += upg.mps;
                upg.cost = Math.floor(upg.cost * 1.25); // Увеличение цены
                
                document.getElementById(`count-${id}`).textContent = upg.count;
                document.getElementById(`btn-${id}`).textContent = formatValue(upg.cost) + ' МПС';
                updateUI();
            }
        };

        // Главный цикл автокликера (10 раз в секунду для плавности)
        setInterval(() => {
            if (mopsPerSecond > 0) {
                mopsCoins += mopsPerSecond / 10;
                updateUI();
            }
        }, 100);

        // Запуск
        initFoodShop();
        initAutoShop();
        updateUI();
    </script>
</body>
</html>
